<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuriJobs — Nieuw wachtwoord</title>
    <link rel="stylesheet" href="css/global.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="auth-logo"><span style="background:linear-gradient(135deg,#e74c3c,#ff6b5b);-webkit-background-clip:text;background-clip:text;color:transparent;">Suri</span><span style="background:linear-gradient(135deg,#10b981,#34d399);-webkit-background-clip:text;background-clip:text;color:transparent;">Jobs</span></div>
        <h1 class="auth-title">Nieuw wachtwoord</h1>
        <p class="auth-subtitle">Kies een nieuw wachtwoord</p>

        <form id="resetForm" class="auth-form">
            <input id="password" type="password" placeholder="Nieuw wachtwoord" class="auth-input" required>
            <input id="confirmPassword" type="password" placeholder="Bevestig wachtwoord" class="auth-input" required>
            <button type="submit" class="auth-btn">Wachtwoord opslaan</button>
        </form>

        <p class="auth-footer"><a href="login.html">Terug naar inloggen</a></p>
    </div>
    <script src="js/api.js"></script>
    <script src="js/reset-password.js"></script>
</body>
</html>
