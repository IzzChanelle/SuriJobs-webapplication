<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dienstverlener Markt</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- FONT AWESOME -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>

<!-- HEADER -->

<header class="top-header">

    <div class="logo">
        <span class="red">Suri</span><span class="green">Jobs</span>
    </div>

    <!-- SEARCH -->

    <div class="search-box">

        <i class="fa-solid fa-magnifying-glass"></i>

        <input type="text" placeholder="Zoek producten">

        <button>
            <i class="fa-solid fa-xmark"></i>
        </button>

    </div>

    <!-- RIGHT -->

    <div class="header-right">

        <div class="notification-box">

            <i class="fa-solid fa-bell"></i>

            <span>5</span>

        </div>

        <div class="account-box">

            <div class="account-circle">
                DV
            </div>

            <div>

                <h4>Dienstverlener</h4>

                <p>Mijn account</p>

            </div>

        </div>

    </div>

</header>

<!-- NAVBAR -->

<nav class="navbar">

    <a href="indexdienstverlener.html">
        <i class="fa-solid fa-house"></i>
        Homepage
    </a>

    <a href="marktdienstverlener.html" class="active">
        <i class="fa-solid fa-store"></i>
        Markt
    </a>

    <a href="dienstendienstverleners.html">
        <i class="fa-solid fa-plus"></i>
        Plaats dienst
    </a>

    <a href="berichtendienstverleners.html">
        <i class="fa-solid fa-message"></i>
        Berichten
    </a>

    <a href="profieldienstverlener.html">
        <i class="fa-solid fa-user"></i>
        Profiel
    </a>

    <!-- SETTINGS -->

    <div class="settings-wrapper">

        <button id="settingsBtn" class="settings-btn">

            <i class="fa-solid fa-gear"></i>

            Instellingen

        </button>

        <!-- SETTINGS MENU -->

        <div id="settingsMenu" class="settings-menu">

            <a href="#">
                <i class="fa-regular fa-user"></i>
                Account instellingen
            </a>

            <a href="#">
                <i class="fa-solid fa-lock"></i>
                Privacy & beveiliging
            </a>

            <a href="#">
                <i class="fa-regular fa-bell"></i>
                Meldingen
            </a>

            <a href="#">
                <i class="fa-solid fa-credit-card"></i>
                Betalingen
            </a>

            <a href="#">
                <i class="fa-solid fa-globe"></i>
                Taal wijzigen
            </a>

            <a href="#" onclick="toggleDarkMode()">
                <i class="fa-solid fa-moon"></i>
                Donkere modus
            </a>

            <a href="#" class="logout">
                <i class="fa-solid fa-right-from-bracket"></i>
                Uitloggen
            </a>

        </div>

    </div>

</nav>

<!-- MARKET -->

<section class="market-products">

    <div class="section-top">

        <h2>Populaire Producten</h2>

        <a href="#">Bekijk alles</a>

    </div>

    <!-- PRODUCTS -->

    <div class="market-grid">

        <!-- PRODUCT -->

        <div class="market-card">

            <button class="save-btn">

                <i class="fa-regular fa-heart"></i>

            </button>

            <div class="market-image">

                <img src="https://images.unsplash.com/photo-1604654894610-df63bc536371?q=80&w=1200&auto=format&fit=crop">

            </div>

            <div class="market-content">

                <div class="market-top">

                    <h3>Gel Nail Set</h3>

                    <span>SRD 450</span>

                </div>

                <p>
                    Complete professionele nail set.
                </p>

            </div>

        </div>

    </div>

</section>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
