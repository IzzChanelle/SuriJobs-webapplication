<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuriJobs — Dashboard</title>
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

<div class="app-layout">

    

    <div class="main-wrap">

        

        <main class="main-content">

            <div class="title-bar">
                <h1 id="dashGreeting">Welkom op je dashboard</h1>
                <p class="subtitle">Bekijk statistieken en beheer je vacatures</p>
            </div>

            <!-- Stats -->
            <div class="dashboard-grid">
                <div class="metric-card scroll-reveal">
                    <div class="metric-label"><span class="page-icon" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></span> Totaal weergaven</div>
                    <div class="metric-value" id="statViews">—</div>
                    <div class="metric-change">van alle vacatures</div>
                </div>
                <div class="metric-card red scroll-reveal">
                    <div class="metric-label"><span class="page-icon" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></span> Sollicitaties</div>
                    <div class="metric-value" id="statApps">—</div>
                    <div class="metric-change" id="statAccepted">— geaccepteerd</div>
                </div>
                <div class="metric-card blue scroll-reveal">
                    <div class="metric-label"><span class="page-icon" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg></span> Actieve vacatures</div>
                    <div class="metric-value" id="statJobs">—</div>
                    <div class="metric-change">geplaatst</div>
                </div>
                <div class="metric-card purple scroll-reveal">
                    <div class="metric-label"><span class="page-icon" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg></span> Conversie</div>
                    <div class="metric-value" id="statConv">—%</div>
                    <div class="metric-change">sollicitaties / weergaven</div>
                </div>
            </div>

            <!-- My jobs -->
            <div class="page-header">
                <h1><span class="page-icon" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></span> Mijn vacatures</h1>
                <button class="btn-primary" id="newJobBtn">+ Nieuwe vacature</button>
            </div>

            <div class="applicant-list" id="myJobsList">
                <div class="loading">Vacatures laden</div>
            </div>

            <!-- Applicants section -->
            <div class="page-header" id="applicantsHeader" style="display:none; margin-top:24px;">
                <h1 id="applicantsTitle">Sollicitanten</h1>
                <button class="btn-secondary" id="closeApplicants">Sluit</button>
            </div>
            <div class="applicant-list" id="applicantsList"></div>

        </main>
    </div>
</div>

<!-- New job modal -->
<div class="post-modal" id="newJobModal">
    <div class="modal-content" style="max-width:580px;">
        <button class="close-modal" id="closeNewJobModal">×</button>
        <div class="modal-info">
            <h2 style="margin-bottom:20px;font-size:1.2rem;">Nieuwe vacature plaatsen</h2>
            <div class="profile-form">
                <div class="form-group full-width">
                    <label>Titel *</label>
                    <input id="jobTitle" type="text" class="form-input" placeholder="Bv. Front-End Developer">
                </div>
                <div class="form-group full-width">
                    <label>Beschrijving</label>
                    <textarea id="jobDescription" class="form-input" placeholder="Wat houdt de rol in?"></textarea>
                </div>
                <div class="form-group">
                    <label>Branche *</label>
                    <select id="jobBranche" class="form-input"></select>
                </div>
                <div class="form-group">
                    <label>District</label>
                    <select id="jobDistrict" class="form-input"></select>
                </div>
                <div class="form-group">
                    <label>Uren</label>
                    <select id="jobHours" class="form-input"></select>
                </div>
                <div class="form-group">
                    <label>Ervaring</label>
                    <select id="jobExperience" class="form-input"></select>
                </div>
                <div class="form-group">
                    <label>Salaris</label>
                    <input id="jobSalary" type="text" class="form-input" placeholder="SRD 10.000">
                </div>
                <div class="form-group">
                    <label>Afbeelding URL</label>
                    <input id="jobImage" type="text" class="form-input" placeholder="https://...">
                </div>
            </div>
            <div class="modal-buttons" style="margin-top:20px;">
                <button id="submitNewJob" class="btn-primary" style="flex:1;justify-content:center;padding:11px;">Plaatsen</button>
            </div>
        </div>
    </div>
</div>

<script src="js/constants.js"></script>
<script src="js/api.js"></script>
<script src="js/topnav.js"></script>
<script src="js/dashboard.js"></script>

<div class="bottom-nav" id="bottomNav" style="display:none;"></div>
<script>
(function(){
    // Clone topnav links into bottom nav for mobile
    function buildBottomNav(){
        var nav = document.getElementById('bottomNav');
        if(!nav) return;
        var links = document.querySelectorAll('.topnav-links .topnav-link');
        if(!links.length){ setTimeout(buildBottomNav, 100); return; }
        nav.innerHTML = '';
        links.forEach(function(l){
            nav.appendChild(l.cloneNode(true));
        });
    }
    if(document.readyState === 'loading'){
        document.addEventListener('DOMContentLoaded', buildBottomNav);
    } else { buildBottomNav(); setTimeout(buildBottomNav, 120); }
})();
</script>
</body>
</html>
