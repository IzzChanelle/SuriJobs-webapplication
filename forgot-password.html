<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuriJobs — Wachtwoord vergeten</title>
    <link rel="stylesheet" href="css/global.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="auth-logo"><span style="background:linear-gradient(135deg,#e74c3c,#ff6b5b);-webkit-background-clip:text;background-clip:text;color:transparent;">Suri</span><span style="background:linear-gradient(135deg,#10b981,#34d399);-webkit-background-clip:text;background-clip:text;color:transparent;">Jobs</span></div>
        <h1 class="auth-title">Wachtwoord vergeten?</h1>
        <p class="auth-subtitle">Vul je email in voor een reset link</p>

        <form id="forgotForm" class="auth-form">
            <input id="email" type="email" placeholder="Email" class="auth-input" required>
            <button type="submit" class="auth-btn">Reset link versturen</button>
        </form>

        <p class="auth-footer">Weet je het weer? <a href="login.html">Log hier in</a></p>
    </div>
    <script src="js/api.js"></script>
    <script src="js/forgot-password.js"></script>
</body>
</html>
